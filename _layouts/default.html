<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 40px;
    }

    header p {
      opacity: 0.8;
    }

    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      transition: 0.3s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-5px);
    }

    a {
      color: #38bdf8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #94a3b8;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Blog 🚀</h1>
  <p>Building my journey in public</p>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
