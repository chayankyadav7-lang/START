<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      margin-left: 20px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.8;
      font-size: 18px;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 20px;
      margin-bottom: 25px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    a {
      color: #38bdf8;
    }

    footer {
      text-align: center;
      padding: 30px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<nav>
  <div><strong>BLOGS</strong></div>
  <div>
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/about.html">About</a>
  </div>
</nav>

<div class="hero">
  <h1>🚀 Build. Learn. Grow.</h1>
  <p>Documenting my journey in tech</p>
</div>

<main>
  {{ content }}
</main>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
