<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #eef2f7;
    }

    header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    main {
      max-width: 900px;
      margin: 30px auto;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    a {
      text-decoration: none;
      color: #333;
    }

    a:hover {
      color: #667eea;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #222;
      color: white;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<header>
  <h1>My Blog 🚀</h1>
  <p>Sharing my journey</p>
</header>

<main>
  {{ content }}
</main>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
