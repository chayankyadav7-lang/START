<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 30px;
      background: #020617;
    }

    nav a {
      color: #38bdf8;
      text-decoration: none;
      margin-left: 15px;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #3b82f6, #9333ea);
      color: white;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      opacity: 0.9;
      font-size: 18px;
    }

    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      transition: 0.3s;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card:hover {
      transform: translateY(-6px);
    }

    a {
      color: #38bdf8;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #020617;
      color: #94a3b8;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<nav>
  <div><strong>MyBlog</strong></div>
  <div>
    <a href="/">Home</a>
  </div>
</nav>

<div class="hero">
  <h1>🚀 Welcome to My Blog</h1>
  <p>Building and learning in public</p>
</div>

<main>
  {{ content }}
</main>

<footer>
  <p>© 2026 My Blog</p>
</footer>

</body>
</html>
