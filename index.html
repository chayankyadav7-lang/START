---
layout: default
title: Home
---

<h2>Latest Posts</h2>

{% for post in site.posts %}
  <div class="card">

    {% if post.image %}
      <img src="{{ post.image }}">
    {% endif %}

    <h2>
      <a href="{{ site.baseurl }}{{ post.url }}">
        {{ post.title }}
      </a>
    </h2>

    <p>{{ post.excerpt }}</p>

    <a href="{{ site.baseurl }}{{ post.url }}">Read More →</a>

  </div>
{% endfor %}
