---
layout: default
title: Home
---

<h2>Latest Posts</h2>

{% for post in site.posts %}
  <div class="card">

    <img src="{{ post.image | default: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800' }}" alt="blog image">

    <h2>
      <a href="{{ site.baseurl }}{{ post.url }}">
        {{ post.title }}
      </a>
    </h2>

    <p><strong>Category:</strong> {{ post.categories | join: ", " }}</p>

    <p>{{ post.excerpt }}</p>

    <a href="{{ site.baseurl }}{{ post.url }}">Read More →</a>

  </div>
{% endfor %}
